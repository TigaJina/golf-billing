<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>教練課程追蹤表</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>%F0%9F%91%80</text></svg>">
<style>
  :root {
    --bg: #FAFAF8;
    --card: #FFFFFF;
    --border: #E5E3DC;
    --text: #1F1E1B;
    --text-secondary: #6B6960;
    --text-tertiary: #9A988F;
    --teal: #0F6E56;
    --teal-light: #E1F5EE;
    --teal-dark: #04342C;
    --coral: #D85A30;
    --coral-light: #FAECE7;
    --coral-dark: #4A1B0C;
    --amber-light: #FAEEDA;
    --amber-dark: #412402;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    padding: 24px;
    min-height: 100vh;
  }
  .wrap { max-width: 1400px; margin: 0 auto; }
  h1 { font-size: 20px; font-weight: 600; margin: 0 0 4px; }
  .subtitle { font-size: 13px; color: var(--text-secondary); margin: 0 0 20px; }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
    margin-bottom: 16px;
  }
  .card h2 {
    font-size: 14px;
    font-weight: 600;
    margin: 0 0 12px;
    color: var(--text-secondary);
  }

  textarea {
    width: 100%;
    min-height: 64px;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    resize: vertical;
    background: var(--bg);
    color: var(--text);
  }
  textarea:focus { outline: none; border-color: var(--teal); }

  .hint {
    font-size: 12px;
    color: var(--text-tertiary);
    margin: 6px 0 0;
  }

  .row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-top: 12px; }
  .row-label { font-size: 12px; color: var(--text-secondary); width: 64px; flex-shrink: 0; }

  .chip {
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    border-radius: 999px;
    padding: 5px 14px;
    font-size: 13px;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
    transition: background 0.1s, border-color 0.1s;
  }
  .chip:hover { border-color: var(--text-tertiary); }
  .chip.active.loc { background: var(--teal-light); color: var(--teal-dark); border-color: var(--teal); }
  .chip.active.tag { background: var(--amber-light); color: var(--amber-dark); border-color: #BA7517; }
  .chip-mini {
    border: 1px solid var(--border);
    background: var(--bg);
    border-radius: 999px;
    padding: 2px 10px;
    font-size: 12px;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    white-space: nowrap;
  }

  input[type="date"], input[type="text"] {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 13px;
    font-family: inherit;
    background: var(--bg);
    color: var(--text);
  }
  input[type="date"]:focus, input[type="text"]:focus { outline: none; border-color: var(--teal); }

  button {
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    border-radius: 8px;
    padding: 7px 16px;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
  }
  button:hover { border-color: var(--text-tertiary); }
  button:active { transform: scale(0.98); }
  .btn-primary { background: var(--teal); color: #fff; border-color: var(--teal); }
  .btn-primary:hover { background: var(--teal-dark); border-color: var(--teal-dark); }
  .btn-text { border: none; background: none; color: var(--text-tertiary); padding: 4px 6px; font-size: 16px; line-height: 1; }
  .btn-text:hover { color: var(--coral); }
  .btn-small { padding: 4px 10px; font-size: 12px; }

  .top-actions { display: flex; gap: 8px; justify-content: flex-end; margin-bottom: 12px; }

  details > summary { cursor: pointer; font-size: 14px; font-weight: 600; color: var(--text-secondary); list-style: none; }
  details > summary::-webkit-details-marker { display: none; }
  details > summary::before { content: "▸ "; font-size: 11px; }
  details[open] > summary::before { content: "▾ "; }
  .settings-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-top: 14px; }
  .settings-col h3 { font-size: 12px; color: var(--text-tertiary); margin: 0 0 8px; font-weight: 600; }
  .settings-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; min-height: 28px; }
  .settings-add { display: flex; gap: 6px; }
  .settings-add input { flex: 1; min-width: 0; }

  table { width: 100%; border-collapse: collapse; font-size: 15px; }
  #tableWrap {
    overflow-x: visible;
    overflow-y: auto;
    max-height: calc(100vh - 340px);
    min-height: 200px;
    width: 100%;
  }
  thead th {
    text-align: left;
    font-size: 13px;
    color: var(--text-tertiary);
    font-weight: 600;
    padding: 0 8px 8px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    position: sticky;
    top: 0;
    background: var(--card);
    z-index: 2;
  }
  th.col-date-h  { white-space: nowrap; width: 1%; }
  th.col-time-h  { white-space: nowrap; width: 1%; }
  th.col-loc-h   { white-space: nowrap; width: 1%; }
  th.col-coach-h { white-space: nowrap; width: 1%; }
  th.col-student-h { white-space: nowrap; width: 8%; }
  th.col-tags-h  { white-space: nowrap; width: 1%; }
  th.col-note-h  { }
  tbody td { padding: 2px 8px; border-bottom: 1px solid var(--border); vertical-align: middle; line-height: 1.3; white-space: nowrap; }
  td.col-note-td, td.col-student-td { white-space: normal; min-width: 80px; }
  tbody tr:nth-child(even) { background: #F5F4F0; }
  tbody tr:nth-child(even):hover { background: #EFEDE8; }
  tbody tr:nth-child(odd):hover { background: #F5F4F0; }

  @keyframes newRowFlash {
    0%   { background-color: #FDE68A; }
    30%  { background-color: #FDE68A; }
    100% { background-color: transparent; }
  }
  tbody tr.row-new,
  tbody tr.row-new:nth-child(even),
  tbody tr.row-new:nth-child(odd) {
    animation: newRowFlash 5s ease-out forwards;
  }
  .action-cell {
    display: flex;
    align-items: center;
    gap: 4px;
    white-space: nowrap;
  }
  thead th:first-child { width: 52px; }

  thead th:first-child { }
  .done-checkbox { width: 16px; height: 16px; cursor: pointer; accent-color: var(--teal); }
  tbody tr.row-done, tbody tr.row-done:nth-child(even), tbody tr.row-done:nth-child(odd) { background: #1F1E1B !important; color: #FFFFFF !important; }
  tr.row-done .student-input, tr.row-done .note-input, tr.row-done .date-btn, tr.row-done .time-btn { color: #CCCCCC !important; background: transparent !important; }
  tr.row-done .loc-select { color: #CCCCCC; background: #1F1E1B; }
  tr.row-done .tag-toggle.on { background: #3D3C38 !important; color: #E5C97A !important; border-color: #5A5750 !important; }
  .col-date { white-space: nowrap; }
  .col-time { white-space: nowrap; color: var(--text-secondary); }
  .student-input {
    border: none;
    background: transparent;
    width: 100%;
    min-width: 100px;
    font-size: 13px;
    font-family: inherit;
    color: var(--text);
    padding: 2px 6px;
    border-radius: 6px;
  }
  .student-input:hover { background: var(--bg); }
  .student-input:focus { outline: none; background: var(--bg); box-shadow: 0 0 0 1px var(--teal); }
  .tag-toggle-row { display: flex; flex-wrap: nowrap; gap: 4px; }
  .tag-toggle {
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 2px 9px;
    font-size: 13px;
    cursor: pointer;
    background: var(--bg);
    color: var(--text-tertiary);
    white-space: nowrap;
  }
  .tag-toggle.on { background: var(--amber-light); color: var(--amber-dark); border-color: #BA7517; }
  .tag-summary { display: flex; flex-wrap: nowrap; gap: 4px; align-items: center; cursor: pointer; }
  .tag-edit-btn {
    font-size: 13px;
    color: var(--text-tertiary);
    padding: 2px 6px;
    border-radius: 6px;
    cursor: pointer;
  }
  .tag-edit-btn:hover { background: var(--bg); color: var(--text); }
  .loc-select {
    border: 1px solid transparent;
    background: transparent;
    font-size: 13px;
    font-family: inherit;
    color: var(--text);
    padding: 2px 4px;
    border-radius: 6px;
    cursor: pointer;
  }
  .loc-select:hover { background: var(--bg); border-color: var(--border); }
  .loc-select:focus { outline: none; background: var(--bg); box-shadow: 0 0 0 1px var(--teal); }

  .empty-state { text-align: center; color: var(--text-tertiary); font-size: 13px; padding: 24px 0; }

  .col-date { position: relative; }
  .date-btn {
    border: none;
    background: transparent;
    font-size: 13px;
    font-family: inherit;
    color: var(--text);
    padding: 2px 6px;
    border-radius: 6px;
    cursor: pointer;
    white-space: nowrap;
  }
  .date-btn:hover { background: var(--bg); }
  .date-hidden-input {
    position: absolute;
    width: 1px;
    height: 1px;
    opacity: 0;
    border: none;
    padding: 0;
    margin: 0;
    overflow: hidden;
    clip: rect(0,0,0,0);
    pointer-events: none;
  }

  .time-btn {
    border: none;
    background: transparent;
    font-size: 13px;
    font-family: inherit;
    color: var(--text-secondary);
    padding: 2px 6px;
    border-radius: 6px;
    cursor: pointer;
    white-space: nowrap;
  }
  .time-btn:hover { background: var(--bg); }
  .time-btn.empty { color: var(--text-tertiary); }

  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  .modal-box {
    background: var(--card);
    border-radius: 12px;
    padding: 20px 24px;
    min-width: 240px;
  }
  .modal-box h3 { margin: 0 0 14px; font-size: 14px; font-weight: 600; }
  .modal-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .modal-row label { font-size: 13px; color: var(--text-secondary); width: 40px; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 14px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>教練課程追蹤表</h1>
  <p class="subtitle">貼上排課訊息,自動拆解成日期、時間、地點、教練、學生與追蹤事項</p>

  <div class="top-actions">
    <button id="btnImport">匯入</button>
    <button id="btnExport">匯出</button>
    <input type="file" id="fileImport" accept=".json" style="display:none">
  </div>

  <div class="card">
    <h2>新增紀錄</h2>
    <textarea id="inputText" placeholder="例如:6/18(四)13:00-14:00@新店 Connie 小明 OK
可一次貼上多行,每行視為一筆紀錄"></textarea>
    <p class="hint">格式不符的行會將原文整理寫進「備註」欄位,日期以新增當天為準</p>

    <div class="row">
      <span class="row-label">地點</span>
      <div id="locChips"></div>
    </div>
    <div class="row">
      <span class="row-label">追蹤事項</span>
      <div id="tagChips"></div>
    </div>
    <p class="hint">以上選項會套用到本次新增的所有行,新增後會清空</p>

    <div class="row" style="margin-top:16px;">
      <button class="btn-primary" id="btnAdd">新增</button>
    </div>
  </div>

  <div class="card">
    <details>
      <summary>管理清單(教練 / 地點 / 追蹤事項)</summary>
      <div class="settings-grid">
        <div class="settings-col">
          <h3>教練名單</h3>
          <div class="settings-list" id="coachList"></div>
          <div class="settings-add">
            <input type="text" id="coachAddInput" placeholder="新增教練名">
            <button class="btn-small" id="coachAddBtn">新增</button>
          </div>
        </div>
        <div class="settings-col">
          <h3>地點清單</h3>
          <div class="settings-list" id="locList"></div>
          <div class="settings-add">
            <input type="text" id="locAddInput" placeholder="新增地點">
            <button class="btn-small" id="locAddBtn">新增</button>
          </div>
        </div>
        <div class="settings-col">
          <h3>追蹤事項清單</h3>
          <div class="settings-list" id="tagList"></div>
          <div class="settings-add">
            <input type="text" id="tagAddInput" placeholder="新增事項">
            <button class="btn-small" id="tagAddBtn">新增</button>
          </div>
        </div>
      </div>
    </details>
  </div>

  <div class="card">
    <h2>課程清單</h2>
    <div id="tableWrap"></div>
  </div>
</div>

<div id="timeModalOverlay" class="modal-overlay" style="display:none;">
  <div class="modal-box">
    <h3>設定時間</h3>
    <div class="modal-row">
      <label>開始</label>
      <select id="timeModalStart"></select>
    </div>
    <div class="modal-row">
      <label>結束</label>
      <select id="timeModalEnd"></select>
    </div>
    <div class="modal-actions">
      <button id="timeModalCancel">取消</button>
      <button class="btn-primary" id="timeModalConfirm">確認</button>
    </div>
  </div>
</div>

<div id="tagModalOverlay" class="modal-overlay" style="display:none;">
  <div class="modal-box">
    <h3>追蹤事項</h3>
    <div id="tagModalChips" class="tag-toggle-row" style="flex-wrap:wrap; gap:8px; margin-bottom:14px;"></div>
    <div class="modal-actions">
      <button id="tagModalClose" class="btn-primary">完成</button>
    </div>
  </div>
</div>

<script>
// ---------- state ----------
const DEFAULT_COACH_ALIASES = {
  'Steven': 'Steven', '翁士棻': 'Steven',
  'Hunter': 'Hunter', '劉旻煜': 'Hunter',
  'Max': 'Max', '謝旻軒': 'Max',
  'Jason': 'Jason', '翁傳傑': 'Jason',
  'Jerry': 'Jerry', '張哲瑋': 'Jerry',
  'Jimmy': 'Jimmy', '林晟毓': 'Jimmy',
  'Jacqueline': 'Jacqueline', '唐瑋安': 'Jacqueline',
  'Linda': 'Linda', '李佳琳': 'Linda',
  'Sean': 'Sean', '黃宣邑': 'Sean',
  'Rick': 'Rick', '陳彥宇': 'Rick',
  'Cerita': 'Cerita', '林怡韻': 'Cerita',
  'Connie': 'Connie', '施柔羽': 'Connie',
  'Peter': 'Peter', '王人立': 'Peter',
  'Simon': 'Simon', '林煒傑': 'Simon',
  'Andy鄭': 'Andy鄭', '鄭永旭': 'Andy鄭', 'Andy': 'Andy黃',
  'Andy黃': 'Andy黃', '黃少驊': 'Andy黃',
  'Jamie': 'Jamie', '謝佳彧': 'Jamie',
  'Aton': 'Aton', '小楊': 'Aton', '楊新宇': 'Aton',
  'Mien': 'Mien', '秦勉': 'Mien',
  'Hank': 'Hank', '林張恆': 'Hank',
  'Eric': 'Eric', '韓欣諺': 'Eric',
};

const state = {
  coachAliases: { ...DEFAULT_COACH_ALIASES },
  locations: ['青年', '新店', '益莊', '美麗華'],
  tags: ['$', '報名表', '入群', '通知', '發票', '續上'],
  entries: [],
  pendingLoc: null,
  pendingTags: new Set(),
};
let nextId = 1;

function coachCanonicalNames() {
  return [...new Set(Object.values(state.coachAliases))];
}

// ---------- parsing ----------
const WEEKDAY_CHARS = ['日', '一', '二', '三', '四', '五', '六'];

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}

function resolveYear(month, day) {
  const now = new Date();
  let year = now.getFullYear();
  let candidate = new Date(year, month - 1, day);
  const diffDays = (candidate - now) / 86400000;
  if (diffDays < -200) {
    year += 1;
    candidate = new Date(year, month - 1, day);
  }
  return { year, candidate };
}

function normalizeText(s) {
  return s
    .replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0))
    .replace(/：/g, ':')
    .replace(/[－―]/g, '-');
}

function matchTime(text, dateMatch) {
  const full = text.match(/(\d{1,2}:\d{2})\s*[-~～至到]\s*(\d{1,2}:\d{2})/);
  if (full) {
    return { raw: full[0], start: full[1], end: full[2] };
  }
  const stripped = dateMatch ? text.replace(dateMatch[0], '') : text;
  const short = stripped.match(/\b(\d{1,2})\s*[-~～至到]\s*(\d{1,2})\b/);
  if (short) {
    return {
      raw: short[0],
      start: short[1].padStart(2, '0') + ':00',
      end: short[2].padStart(2, '0') + ':00',
    };
  }
  return null;
}

function parseTigaFormat(text) {
  const body = text.slice(4); // 去除開頭的 "Tiga"
  const spaceIdx = body.search(/\s/);
  if (spaceIdx === -1) return null;

  const coachToken = body.slice(0, spaceIdx).trim();
  let rest = body.slice(spaceIdx + 1).trim();
  if (!coachToken || !rest) return null;

  let note = '';
  const typeMatch = rest.match(/(一對[一二三四五六七八九十\d]+)\s*$/);
  if (typeMatch) {
    note = typeMatch[1];
    rest = rest.slice(0, rest.length - typeMatch[0].length).trim();
  }

  const students = rest.split(/[,，、]/).map(s => s.trim()).filter(Boolean);
  if (!students.length) return null;

  return {
    coach: state.coachAliases[coachToken] || coachToken,
    student: students.join('、'),
    note,
  };
}

function parseLine(raw) {
  const text = normalizeText(raw.trim());
  if (!text) return null;

  if (text.startsWith('Tiga')) {
    const tiga = parseTigaFormat(text);
    if (tiga) {
      return {
        hasSchedule: false,
        time: '', location: '',
        coach: tiga.coach, student: tiga.student,
        tags: [], note: tiga.note,
        raw: text,
      };
    }
  }

  const dateMatch = text.match(/(\d{1,2})\/(\d{1,2})/);
  const time = matchTime(text, dateMatch);
  const locMatch = text.match(/@([^\s]+)/);
  if (!dateMatch || !time || !locMatch) {
    return {
      hasSchedule: false,
      time: '', location: '', coach: '', student: '',
      tags: [], note: text, raw: text,
    };
  }

  const month = parseInt(dateMatch[1], 10);
  const day = parseInt(dateMatch[2], 10);
  const { year, candidate } = resolveYear(month, day);
  const weekday = WEEKDAY_CHARS[candidate.getDay()];

  // strip out date(+optional weekday parens), time, and @location from the line
  let rest = text;
  rest = rest.replace(dateMatch[0], '');
  rest = rest.replace(/^\s*\([^)]*\)/, '');
  rest = rest.replace(time.raw, '');
  rest = rest.replace(locMatch[0], '');
  rest = rest.replace(/(早上|上午|中午|下午|晚上|凌晨)/g, '');

  const tokens = rest.split(/\s+/).filter(Boolean);

  let coach = '';
  let coachIdx = -1;
  for (let i = 0; i < tokens.length; i++) {
    if (Object.prototype.hasOwnProperty.call(state.coachAliases, tokens[i])) {
      coach = state.coachAliases[tokens[i]];
      coachIdx = i;
      break;
    }
  }
  if (coachIdx === -1 && tokens.length) {
    coach = tokens[0];
    coachIdx = 0;
  }
  const remaining = tokens.filter((_, i) => i !== coachIdx);

  const foundTags = [];
  const leftover = [];
  remaining.forEach(tok => {
    if (state.tags.includes(tok)) foundTags.push(tok);
    else leftover.push(tok);
  });

  const locText = locMatch[1];
  const matchedLoc = state.locations.find(l => l === locText) || locText;

  return {
    hasSchedule: true,
    year, month, day, weekday,
    time: `${time.start}-${time.end}`,
    location: matchedLoc,
    coach,
    student: leftover.join(' '),
    tags: foundTags,
    note: '',
    raw: text,
  };
}

// ---------- rendering: quick-select chips ----------
function renderLocChips() {
  const wrap = document.getElementById('locChips');
  wrap.innerHTML = '';
  state.locations.forEach(loc => {
    const c = document.createElement('button');
    c.type = 'button';
    c.className = 'chip loc' + (state.pendingLoc === loc ? ' active' : '');
    c.textContent = loc;
    c.onclick = () => {
      state.pendingLoc = state.pendingLoc === loc ? null : loc;
      renderLocChips();
    };
    wrap.appendChild(c);
  });
}

function renderTagChips() {
  const wrap = document.getElementById('tagChips');
  wrap.innerHTML = '';
  state.tags.forEach(tag => {
    const c = document.createElement('button');
    c.type = 'button';
    c.className = 'chip tag' + (state.pendingTags.has(tag) ? ' active' : '');
    c.textContent = tag;
    c.onclick = () => {
      if (state.pendingTags.has(tag)) state.pendingTags.delete(tag);
      else state.pendingTags.add(tag);
      renderTagChips();
    };
    wrap.appendChild(c);
  });
}

// ---------- rendering: settings lists ----------
function renderCoachList() {
  const wrap = document.getElementById('coachList');
  wrap.innerHTML = '';
  coachCanonicalNames().forEach(name => {
    const chip = document.createElement('span');
    chip.className = 'chip-mini';
    chip.textContent = name;
    const x = document.createElement('span');
    x.textContent = '✕';
    x.style.cursor = 'pointer';
    x.style.color = 'var(--text-tertiary)';
    x.onclick = () => {
      Object.keys(state.coachAliases).forEach(alias => {
        if (state.coachAliases[alias] === name) delete state.coachAliases[alias];
      });
      renderCoachList();
      saveState();
    };
    chip.appendChild(x);
    wrap.appendChild(chip);
  });
}

function setupCoachAdd() {
  const input = document.getElementById('coachAddInput');
  const btn = document.getElementById('coachAddBtn');
  const add = () => {
    const val = input.value.trim();
    if (!val || Object.prototype.hasOwnProperty.call(state.coachAliases, val)) { input.value = ''; return; }
    state.coachAliases[val] = val;
    input.value = '';
    renderCoachList();
    saveState();
  };
  btn.onclick = add;
  input.addEventListener('keydown', e => { if (e.key === 'Enter') add(); });
}

function renderSettingsList(listKey, containerId) {
  const wrap = document.getElementById(containerId);
  wrap.innerHTML = '';
  state[listKey].forEach((item, idx) => {
    const chip = document.createElement('span');
    chip.className = 'chip-mini';
    chip.textContent = item;
    const x = document.createElement('span');
    x.textContent = '✕';
    x.style.cursor = 'pointer';
    x.style.color = 'var(--text-tertiary)';
    x.onclick = () => {
      state[listKey].splice(idx, 1);
      renderSettingsList(listKey, containerId);
      saveState();
    };
    chip.appendChild(x);
    wrap.appendChild(chip);
  });
}

function renderAllSettingsLists() {
  renderCoachList();
  renderSettingsList('locations', 'locList');
  renderSettingsList('tags', 'tagList');
  renderLocChips();
  renderTagChips();
}

function setupSettingsAdd(listKey, inputId, btnId, containerId) {
  const input = document.getElementById(inputId);
  const btn = document.getElementById(btnId);
  const add = () => {
    const val = input.value.trim();
    if (!val || state[listKey].includes(val)) { input.value = ''; return; }
    state[listKey].push(val);
    input.value = '';
    renderSettingsList(listKey, containerId);
    if (listKey === 'locations') renderLocChips();
    if (listKey === 'tags') renderTagChips();
    saveState();
  };
  btn.onclick = add;
  input.addEventListener('keydown', e => { if (e.key === 'Enter') add(); });
}

// ---------- rendering: main table ----------
function sortKey(e) {
  const hour = parseInt(e.time.slice(0, 2)) || 0;
  const minute = parseInt(e.time.slice(3, 5)) || 0;
  return e.year * 100000000 + e.month * 1000000 + e.day * 10000 + hour * 100 + minute;
}

function isoDate(e) {
  return `${e.year}-${String(e.month).padStart(2, '0')}-${String(e.day).padStart(2, '0')}`;
}

function buildTagToggleHTML(entry) {
  return state.tags.map(tag => {
    const on = entry.tags.includes(tag);
    return `<span class="tag-toggle${on ? ' on' : ''}" data-id="${entry.id}" data-tag="${tag}">${tag}</span>`;
  }).join('');
}

function buildTagSummaryHTML(entry) {
  const selected = entry.tags.filter(t => state.tags.includes(t));
  const chips = selected.map(t => `<span class="tag-toggle on">${t}</span>`).join('');
  return `<div class="tag-summary" data-tagid="${entry.id}">${chips}<span class="tag-edit-btn">${selected.length ? '…' : '+'}</span></div>`;
}

function buildLocationSelectHTML(entry) {
  const options = ['', ...state.locations].map(loc => {
    const label = loc || '(未選)';
    const selected = entry.location === loc ? ' selected' : '';
    return `<option value="${loc}"${selected}>${label}</option>`;
  }).join('');
  return `<select class="loc-select" data-loc="${entry.id}">${options}</select>`;
}

function renderTable() {
  const wrap = document.getElementById('tableWrap');
  if (!state.entries.length) {
    wrap.innerHTML = '<p class="empty-state">尚無紀錄,於上方貼上排課訊息後按新增</p>';
    return;
  }
  const sorted = [...state.entries].sort((a, b) => sortKey(a) - sortKey(b));

  let html = `<table><thead><tr>
    <th></th>
    <th class="col-date-h">日期</th>
    <th class="col-time-h">時間</th>
    <th class="col-loc-h">地點</th>
    <th class="col-coach-h">教練</th>
    <th class="col-student-h">學生</th>
    <th class="col-tags-h">追蹤事項</th>
    <th class="col-note-h">備註</th>
  </tr></thead><tbody>`;

  sorted.forEach(e => {
    html += `<tr id="row-${e.id}" class="${e.done ? 'row-done' : ''}">
      <td class="action-cell">
        <input type="checkbox" class="done-checkbox" data-done="${e.id}" title="完成" ${e.done ? 'checked' : ''}>
        <button class="btn-text" data-del="${e.id}" title="刪除">✕</button>
      </td>
      <td class="col-date">
        <button class="date-btn" data-dateid="${e.id}">${e.month}/${e.day}(${e.weekday})</button>
        <input type="date" class="date-hidden-input" data-dateinput="${e.id}" value="${isoDate(e)}">
      </td>
      <td class="col-time"><button class="time-btn${e.time ? '' : ' empty'}" data-timeid="${e.id}">${e.time || '設定時間'}</button></td>
      <td>${buildLocationSelectHTML(e)}</td>
      <td><input class="student-input" data-coachid="${e.id}" value="${e.coach.replace(/"/g, '&quot;')}" placeholder="教練"></td>
      <td class="col-student-td"><input class="student-input" data-id="${e.id}" value="${e.student.replace(/"/g, '&quot;')}" placeholder="學生名"></td>
      <td>${buildTagSummaryHTML(e)}</td>
      <td class="col-note-td"><input class="student-input note-input" data-noteid="${e.id}" value="${e.note.replace(/"/g, '&quot;')}" placeholder="備註"></td>
    </tr>`;
  });

  html += '</tbody></table>';
  wrap.innerHTML = html;

  wrap.querySelectorAll('.student-input[data-id]').forEach(inp => {
    inp.addEventListener('input', () => {
      const entry = state.entries.find(x => x.id === parseInt(inp.dataset.id));
      if (entry) { entry.student = inp.value; saveState(); }
    });
  });

  wrap.querySelectorAll('[data-coachid]').forEach(inp => {
    inp.addEventListener('input', () => {
      const entry = state.entries.find(x => x.id === parseInt(inp.dataset.coachid));
      if (entry) { entry.coach = inp.value; saveState(); }
    });
  });

  wrap.querySelectorAll('[data-noteid]').forEach(inp => {
    inp.addEventListener('input', () => {
      const entry = state.entries.find(x => x.id === parseInt(inp.dataset.noteid));
      if (entry) { entry.note = inp.value; saveState(); }
    });
  });

  wrap.querySelectorAll('.date-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const input = wrap.querySelector(`[data-dateinput="${btn.dataset.dateid}"]`);
      if (input.showPicker) {
        try { input.showPicker(); } catch (err) { input.focus(); }
      } else {
        input.focus();
      }
    });
  });

  wrap.querySelectorAll('[data-dateinput]').forEach(inp => {
    inp.addEventListener('change', () => {
      if (!inp.value) return;
      const entry = state.entries.find(x => x.id === parseInt(inp.dataset.dateinput));
      if (!entry) return;
      const [y, m, d] = inp.value.split('-').map(Number);
      entry.year = y;
      entry.month = m;
      entry.day = d;
      entry.weekday = WEEKDAY_CHARS[new Date(y, m - 1, d).getDay()];
      renderTable();
      saveState();
    });
  });

  wrap.querySelectorAll('[data-timeid]').forEach(btn => {
    btn.addEventListener('click', () => openTimeModal(parseInt(btn.dataset.timeid)));
  });

  wrap.querySelectorAll('[data-loc]').forEach(sel => {
    sel.addEventListener('change', () => {
      const entry = state.entries.find(x => x.id === parseInt(sel.dataset.loc));
      if (entry) { entry.location = sel.value; saveState(); }
    });
  });

  wrap.querySelectorAll('[data-done]').forEach(cb => {
    cb.addEventListener('change', () => {
      const entry = state.entries.find(x => x.id === parseInt(cb.dataset.done));
      if (!entry) return;
      entry.done = cb.checked;
      entry.doneAt = cb.checked ? todayStr() : '';
      document.getElementById(`row-${entry.id}`).classList.toggle('row-done', cb.checked);
      saveState();
    });
  });

  wrap.querySelectorAll('[data-del]').forEach(btn => {
    btn.addEventListener('click', () => {
      state.entries = state.entries.filter(x => x.id !== parseInt(btn.dataset.del));
      renderTable();
      saveState();
    });
  });

  wrap.querySelectorAll('.tag-summary').forEach(div => {
    div.addEventListener('click', () => openTagModal(parseInt(div.dataset.tagid)));
  });
}

function bindTagToggle(t) {
  t.addEventListener('click', () => {
    const id = parseInt(t.dataset.id);
    const tag = t.dataset.tag;
    const entry = state.entries.find(x => x.id === id);
    if (!entry) return;
    const i = entry.tags.indexOf(tag);
    if (i === -1) entry.tags.push(tag); else entry.tags.splice(i, 1);
    t.classList.toggle('on', entry.tags.includes(tag));
    // 更新表格摘要
    const summary = document.querySelector(`.tag-summary[data-tagid="${id}"]`);
    if (summary) summary.outerHTML = buildTagSummaryHTML(entry);
    saveState();
  });
}

// ---------- persistence (localStorage) ----------
const STORAGE_KEY = 'tigaTrackerData';

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      coachAliases: state.coachAliases,
      locations: state.locations,
      tags: state.tags,
      entries: state.entries,
      nextId,
    }));
  } catch (err) {
    console.warn('儲存失敗', err);
  }
}

function applyImportedData(data) {
  if (data.coachAliases && typeof data.coachAliases === 'object') {
    state.coachAliases = data.coachAliases;
  } else if (Array.isArray(data.coaches)) {
    state.coachAliases = {};
    data.coaches.forEach(name => { state.coachAliases[name] = name; });
  }
  if (Array.isArray(data.locations)) state.locations = data.locations;
  if (Array.isArray(data.tags)) state.tags = data.tags;
  if (Array.isArray(data.entries)) {
    state.entries = data.entries.map(e => ({ note: '', ...e }));
  }
  if (Array.isArray(data.unparsed) && data.unparsed.length) {
    const today = new Date();
    data.unparsed.forEach(u => {
      state.entries.push({
        id: nextId++,
        year: today.getFullYear(),
        month: today.getMonth() + 1,
        day: today.getDate(),
        weekday: WEEKDAY_CHARS[today.getDay()],
        time: '', location: '', coach: '', student: '',
        tags: [], note: u.raw, raw: u.raw,
      });
    });
  }
  if (typeof data.nextId === 'number') nextId = Math.max(nextId, data.nextId);
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    applyImportedData(JSON.parse(raw));
  } catch (err) {
    console.warn('讀取上次資料失敗', err);
  }
}

// ---------- add entries ----------
function addEntries() {
  const textarea = document.getElementById('inputText');
  const lines = textarea.value.split('\n').map(l => l.trim()).filter(Boolean);
  if (!lines.length) return;

  const today = new Date();
  const newIds = [];

  lines.forEach(line => {
    const result = parseLine(line);
    if (!result) return;

    if (!result.hasSchedule) {
      result.year = today.getFullYear();
      result.month = today.getMonth() + 1;
      result.day = today.getDate();
      result.weekday = WEEKDAY_CHARS[today.getDay()];
    }

    if (state.pendingLoc) result.location = state.pendingLoc;
    state.pendingTags.forEach(t => { if (!result.tags.includes(t)) result.tags.push(t); });
    result.id = nextId++;
    result.done = false;
    result.doneAt = '';
    state.entries.push(result);
    newIds.push(result.id);
  });

  textarea.value = '';
  state.pendingLoc = null;
  state.pendingTags.clear();
  renderLocChips();
  renderTagChips();
  renderTable();
  newIds.forEach(id => {
    const row = document.getElementById(`row-${id}`);
    if (row) {
      row.classList.add('row-new');
      row.addEventListener('animationend', () => row.classList.remove('row-new'), { once: true });
    }
  });
  saveState();
}

// ---------- import / export ----------
function exportData() {
  const data = {
    coachAliases: state.coachAliases,
    locations: state.locations,
    tags: state.tags,
    entries: state.entries,
    nextId,
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const today = new Date();
  const stamp = `${today.getFullYear()}${String(today.getMonth()+1).padStart(2,'0')}${String(today.getDate()).padStart(2,'0')}`;
  a.href = url;
  a.download = `課程追蹤表_${stamp}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importData(file) {
  const reader = new FileReader();
  reader.onload = () => {
    try {
      applyImportedData(JSON.parse(reader.result));
      renderAllSettingsLists();
      renderTable();
      saveState();
    } catch (err) {
      alert('匯入失敗,檔案格式不正確');
    }
  };
  reader.readAsText(file);
}

// ---------- time edit modal ----------
let timeModalEntryId = null;

function halfHourOptionsHTML() {
  let opts = '<option value="">--</option>';
  for (let h = 0; h < 24; h++) {
    for (const m of [0, 30]) {
      const val = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
      opts += `<option value="${val}">${val}</option>`;
    }
  }
  return opts;
}

document.getElementById('timeModalStart').innerHTML = halfHourOptionsHTML();
document.getElementById('timeModalEnd').innerHTML = halfHourOptionsHTML();

function openTimeModal(id) {
  const entry = state.entries.find(x => x.id === id);
  if (!entry) return;
  timeModalEntryId = id;
  const [start, end] = entry.time ? entry.time.split('-') : ['', ''];
  document.getElementById('timeModalStart').value = start || '';
  document.getElementById('timeModalEnd').value = end || '';
  document.getElementById('timeModalOverlay').style.display = 'flex';
}

function closeTimeModal() {
  timeModalEntryId = null;
  document.getElementById('timeModalOverlay').style.display = 'none';
}

document.getElementById('timeModalCancel').addEventListener('click', closeTimeModal);
document.getElementById('timeModalOverlay').addEventListener('click', e => {
  if (e.target.id === 'timeModalOverlay') closeTimeModal();
});
document.getElementById('timeModalConfirm').addEventListener('click', () => {
  const entry = state.entries.find(x => x.id === timeModalEntryId);
  if (!entry) { closeTimeModal(); return; }
  const start = document.getElementById('timeModalStart').value;
  const end = document.getElementById('timeModalEnd').value;
  entry.time = (start && end) ? `${start}-${end}` : '';
  closeTimeModal();
  renderTable();
  saveState();
});

// ---------- tag edit modal ----------
let tagModalEntryId = null;

function openTagModal(id) {
  const entry = state.entries.find(x => x.id === id);
  if (!entry) return;
  tagModalEntryId = id;
  const chips = document.getElementById('tagModalChips');
  chips.innerHTML = buildTagToggleHTML(entry);
  chips.querySelectorAll('.tag-toggle').forEach(t => {
    t.addEventListener('click', () => {
      const tag = t.dataset.tag;
      const i = entry.tags.indexOf(tag);
      if (i === -1) entry.tags.push(tag); else entry.tags.splice(i, 1);
      t.classList.toggle('on', entry.tags.includes(tag));
    });
  });
  document.getElementById('tagModalOverlay').style.display = 'flex';
}

document.getElementById('tagModalClose').addEventListener('click', () => {
  const entry = state.entries.find(x => x.id === tagModalEntryId);
  if (entry) {
    const summary = document.querySelector(`.tag-summary[data-tagid="${tagModalEntryId}"]`);
    if (summary) {
      const newDiv = document.createElement('div');
      newDiv.outerHTML = buildTagSummaryHTML(entry);
      summary.outerHTML = buildTagSummaryHTML(entry);
      // rebind
      const newSummary = document.querySelector(`.tag-summary[data-tagid="${tagModalEntryId}"]`);
      if (newSummary) newSummary.addEventListener('click', () => openTagModal(tagModalEntryId));
    }
    saveState();
  }
  tagModalEntryId = null;
  document.getElementById('tagModalOverlay').style.display = 'none';
});

document.getElementById('tagModalOverlay').addEventListener('click', e => {
  if (e.target.id === 'tagModalOverlay') document.getElementById('tagModalClose').click();
});

// ---------- wire up ----------
document.getElementById('btnAdd').addEventListener('click', addEntries);
document.getElementById('btnExport').addEventListener('click', exportData);
document.getElementById('btnImport').addEventListener('click', () => {
  document.getElementById('fileImport').click();
});
document.getElementById('fileImport').addEventListener('change', e => {
  if (e.target.files[0]) importData(e.target.files[0]);
  e.target.value = '';
});

setupCoachAdd();
setupSettingsAdd('locations', 'locAddInput', 'locAddBtn', 'locList');
setupSettingsAdd('tags', 'tagAddInput', 'tagAddBtn', 'tagList');

loadState();
renderAllSettingsLists();
renderTable();
</script>
